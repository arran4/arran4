name: Update README repo table
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Update table
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/update_repo_table.sh
      - name: Generate PR summary
        shell: bash
        run: |
          {
            echo "## Summary"
            echo
            echo "This PR updates the README repository table."
            echo
            echo "## What changed"
            echo
            if git diff --quiet; then
              echo "- No changes detected."
            else
              echo "- Regenerated the repo table."
              echo
              echo "## Files changed"
              echo
              git diff --name-only | sed 's/^/- `/; s/$/`/'
              echo
              echo "## Diff stat"
              echo
              echo '```text'
              git diff --stat
              echo '```'
              echo
              echo '<details><summary>Detailed Diff</summary>'
              echo
              echo '```diff'
              git diff
              echo '```'
              echo
              echo '</details>'
            fi
            echo
            echo "## Notes"
            echo
            echo "- Auto-generated by GitHub Actions."
          } > pr-body.md

          cat pr-body.md >> "$GITHUB_STEP_SUMMARY"

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: Update repo table
          title: Update repo table
          body-path: pr-body.md
          branch: update-repo-table
          delete-branch: true
